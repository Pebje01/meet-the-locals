<!--
  Meet the Locals | e-mailhandtekening voor Spark
  ------------------------------------------------
  Huisstijl:
    forest       #2a4a2a   (koppen, naam)
    forest-dark  #0f1d0f   (donker groen)
    accent       #bd6a3a   (terracotta, links)
    sand         #c4a97d   (divider)
    text-muted   #6b6b6b   (functie, labels)

  LET OP - vervang de placeholders hieronder:
    1. {{LOGO_URL}}  -> absolute URL naar het logo (bv. https://meetthelocals.nl/media/logo.webp
                        of de S3-URL https://fsn1.your-objectstorage.com/meetthelocals-media/logo.webp).
                        E-mailclients laden geen lokale of relatieve paden, de URL moet publiek bereikbaar zijn.
    2. Telefoonnummer, functie en socials waar aangegeven.

  Fonts: e-mailclients laden geen Typekit (poleno/athletics), daarom valt de display-tekst
  netjes terug op Georgia (serif) en de body op een systeem-sans-serif.
-->
<table cellpadding="0" cellspacing="0" border="0" role="presentation" style="border-collapse:collapse; font-family:'Helvetica Neue', Arial, sans-serif;">
  <tr>
    <!-- Logo -->
    <td valign="top" style="padding:0 20px 0 0;">
      <img src="{{LOGO_URL}}"
           width="72" height="72" alt="Meet the Locals"
           style="display:block; width:72px; height:72px; border:0; outline:none; text-decoration:none;" />
    </td>

    <!-- Verticale divider in zandkleur -->
    <td style="width:1px; padding:2px 0; background-color:#c4a97d;">&nbsp;</td>

    <!-- Tekstblok -->
    <td valign="top" style="padding:0 0 0 20px;">
      <!-- Naam -->
      <div style="font-family:Georgia, 'Times New Roman', serif; font-size:19px; line-height:22px; font-weight:700; color:#2a4a2a; letter-spacing:0.2px;">
        Daley Jansen
      </div>

      <!-- Functie -->
      <div style="font-family:'Helvetica Neue', Arial, sans-serif; font-size:12px; line-height:16px; color:#6b6b6b; padding:3px 0 10px 0; text-transform:uppercase; letter-spacing:1px;">
        Oprichter <span style="color:#c4a97d;">|</span> Meet the Locals
      </div>

      <!-- Contactgegevens -->
      <div style="font-family:'Helvetica Neue', Arial, sans-serif; font-size:12px; line-height:19px; color:#1a1a1a;">
        <a href="mailto:daleyjansen@gmail.com" style="color:#bd6a3a; text-decoration:none;">daleyjansen@gmail.com</a>
        <span style="color:#c4a97d;">&nbsp;|&nbsp;</span>
        <a href="tel:+31612345678" style="color:#bd6a3a; text-decoration:none;">+31 6 12 34 56 78</a>
      </div>
      <div style="font-family:'Helvetica Neue', Arial, sans-serif; font-size:12px; line-height:19px;">
        <a href="https://meetthelocals.nl" style="color:#2a4a2a; text-decoration:none; font-weight:600;">meetthelocals.nl</a>
      </div>

      <!-- Socials -->
      <div style="font-family:'Helvetica Neue', Arial, sans-serif; font-size:12px; line-height:19px; padding-top:8px;">
        <a href="https://instagram.com/meetthelocals" style="color:#bd6a3a; text-decoration:none;">Instagram</a>
        <span style="color:#c4a97d;">&nbsp;|&nbsp;</span>
        <a href="https://facebook.com/meetthelocals" style="color:#bd6a3a; text-decoration:none;">Facebook</a>
        <span style="color:#c4a97d;">&nbsp;|&nbsp;</span>
        <a href="https://youtube.com/@meetthelocals" style="color:#bd6a3a; text-decoration:none;">YouTube</a>
      </div>

      <!-- Tagline -->
      <div style="font-family:Georgia, 'Times New Roman', serif; font-style:italic; font-size:12px; line-height:16px; color:#526f52; padding-top:10px;">
        Reizen zoals de locals dat doen.
      </div>
    </td>
  </tr>
</table>
